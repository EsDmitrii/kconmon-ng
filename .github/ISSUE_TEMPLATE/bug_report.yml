name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: kconmon-ng version
      description: Output of `/api/v1/version` or Helm chart version
      placeholder: "e.g. 0.1.0 or dev"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Agent
        - Controller
        - Helm chart
        - Dashboards
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Kubernetes version, cloud provider, node count, etc.
      render: text
      value: |
        - Kubernetes: v1.x.x
        - Cloud/Platform:
        - Nodes:
        - Helm values (relevant parts):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Controller/agent logs, `kubectl describe pod`, events, etc.
      render: text
    validations:
      required: false
