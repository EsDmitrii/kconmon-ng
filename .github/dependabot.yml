---
version: 2
updates:
  # Go module dependencies: CVE fixes in grpc/x-net/otel land as normal PRs
  # instead of accumulating until the next Artifact Hub security scan.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  # Group all Action bumps into one PR per week instead of one PR per action
  # (the first run otherwise opens a pile of separate PRs).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]
