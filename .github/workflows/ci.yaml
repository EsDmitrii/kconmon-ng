name: CI

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate protobuf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf into api/proto
        run: buf generate --template api/proto/buf.gen.yaml

      - name: Assert generated files exist
        run: |
          set -e
          echo "=== api/proto generated files ==="
          find api/proto -type f \( -name "*.pb.go" -o -name "*_grpc.pb.go" \) -print
          test -n "$(find api/proto -type f -name "*.pb.go" -print -quit)"

      - name: Upload generated proto
        uses: actions/upload-artifact@v4
        with:
          name: proto-generated
          path: |
            api/proto/**/*.pb.go
            api/proto/**/*_grpc.pb.go
          retention-days: 1

  lint:
    name: Lint
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: api/proto

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          cache-invalidation-interval: 7

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: api/proto

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -race -coverprofile=coverage.txt -covermode=atomic -count=1 ./...

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          retention-days: 7

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download generated proto
        uses: actions/download-artifact@v4
        with:
          name: proto-generated
          path: api/proto

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build agent
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/agent

      - name: Build controller
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/controller

  helm-lint:
    name: Helm Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Lint chart
        run: |
          helm lint charts/kconmon-ng
          for f in charts/kconmon-ng/ci/*.yaml; do
            echo "--- Linting with $f"
            helm lint charts/kconmon-ng -f "$f"
          done
