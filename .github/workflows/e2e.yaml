name: E2E

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect release tag and build metadata
        id: meta
        run: |
          set -e
          git fetch --tags --force

          TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n1 || true)"
          if [ -z "$TAG" ]; then
            echo "No v* tag points at this commit. Skipping E2E."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "commit=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: ${{ steps.meta.outputs.skip != 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Buf
        if: ${{ steps.meta.outputs.skip != 'true' }}
        uses: bufbuild/buf-setup-action@v1

      - name: Generate protobuf into api/proto
        if: ${{ steps.meta.outputs.skip != 'true' }}
        run: |
          cat > buf.gen.ci.yaml <<'YAML'
          version: v2
          plugins:
            - remote: buf.build/protocolbuffers/go
              out: api/proto
              opt: paths=source_relative
            - remote: buf.build/grpc/go
              out: api/proto
              opt: paths=source_relative
          YAML

          buf generate --template buf.gen.ci.yaml
          test -n "$(find api/proto -type f -name '*.pb.go' -print -quit)"

      - name: Write kind config
        if: ${{ steps.meta.outputs.skip != 'true' }}
        run: |
          cat > kind-config.yaml <<'YAML'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          YAML

      - name: Create Kind cluster
        if: ${{ steps.meta.outputs.skip != 'true' }}
        uses: helm/kind-action@v1
        with:
          cluster_name: kconmon-ng-e2e
          node_image: kindest/node:v1.31.0
          config_file: kind-config.yaml

      - name: Set up Docker Buildx
        if: ${{ steps.meta.outputs.skip != 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build agent image
        if: ${{ steps.meta.outputs.skip != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: kconmon-ng-agent:test
          target: agent
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}

      - name: Build controller image
        if: ${{ steps.meta.outputs.skip != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: kconmon-ng-controller:test
          target: controller
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}

      - name: Load images into Kind
        if: ${{ steps.meta.outputs.skip != 'true' }}
        run: |
          kind load docker-image kconmon-ng-agent:test --name kconmon-ng-e2e
          kind load docker-image kconmon-ng-controller:test --name kconmon-ng-e2e

      - name: Install Helm chart
        if: ${{ steps.meta.outputs.skip != 'true' }}
        run: |
          helm upgrade --install kconmon-ng ./charts/kconmon-ng \
            -f e2e/testdata/values.yaml \
            --set controller.image.repository=kconmon-ng-controller \
            --set controller.image.tag=test \
            --set controller.image.pullPolicy=Never \
            --set agent.image.repository=kconmon-ng-agent \
            --set agent.image.tag=test \
            --set agent.image.pullPolicy=Never \
            --wait \
            --timeout 5m

      - name: Wait for pods
        if: ${{ steps.meta.outputs.skip != 'true' }}
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=kconmon-ng \
            --timeout=120s

      - name: Smoke tests
        if: ${{ steps.meta.outputs.skip != 'true' }}
        run: |
          CONTROLLER_POD=$(kubectl get pods \
            -l app.kubernetes.io/component=controller \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward "pod/$CONTROLLER_POD" 8080:8080 &
          PF_PID=$!
          sleep 3

          curl -sf http://localhost:8080/healthz
          curl -sf http://localhost:8080/readyz
          curl -sf http://localhost:8080/metrics | head -20
          curl -sf http://localhost:8080/api/v1/topology

          kill $PF_PID || true

      - name: Run E2E tests
        if: ${{ steps.meta.outputs.skip != 'true' }}
        run: |
          CONTROLLER_POD=$(kubectl get pods \
            -l app.kubernetes.io/component=controller \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward "pod/$CONTROLLER_POD" 8080:8080 &
          sleep 3
          go test -tags=e2e -v -count=1 ./e2e/... -timeout 120s
        env:
          KCONMON_CONTROLLER_URL: http://localhost:8080

      - name: Collect debug info on failure
        if: ${{ steps.meta.outputs.skip != 'true' && failure() }}
        run: |
          echo "=== Pod status ==="
          kubectl get pods -o wide
          echo "=== Controller logs ==="
          kubectl logs -l app.kubernetes.io/component=controller --tail=50 || true
          echo "=== Agent logs ==="
          kubectl logs -l app.kubernetes.io/component=agent --tail=50 || true
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' | tail -30
