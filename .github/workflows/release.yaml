name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write # cosign keyless signing (OIDC)

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract current release notes
        run: |
          # RELEASE_NOTES.md keeps the full history; the GitHub Release body
          # should carry only the topmost (current) version section.
          awk '/^## kconmon-ng v/{n++} n==1' RELEASE_NOTES.md > /tmp/current-release-notes.md
          test -s /tmp/current-release-notes.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~>v2
          args: release --clean --release-notes /tmp/current-release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render and upload krew manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ./krew/render-manifest.sh "$VERSION" dist kconmon.yaml
          gh release upload "$GITHUB_REF_NAME" kconmon.yaml --clobber

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Package and push Helm chart
        id: helm-push
        env:
          HELM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$HELM_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          VERSION="${GITHUB_REF#refs/tags/v}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package charts/kconmon-ng --version "$VERSION" --app-version "$VERSION"
          PUSH_OUT=$(helm push "kconmon-ng-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts" 2>&1)
          echo "$PUSH_OUT"
          echo "digest=$(echo "$PUSH_OUT" | awk '/^Digest:/{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Helm chart (cosign keyless)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Sign by digest, not tag: tags are mutable, digests are what verifiers pin.
          cosign sign --yes "ghcr.io/${OWNER}/charts/kconmon-ng@${{ steps.helm-push.outputs.digest }}"

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Publish Artifact Hub repository metadata
        env:
          ORAS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          printf '%s' "$ORAS_TOKEN" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras push "ghcr.io/${OWNER}/charts/kconmon-ng:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
