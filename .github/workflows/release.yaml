name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~>v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Package and push Helm chart
        env:
          HELM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$HELM_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          VERSION="${GITHUB_REF#refs/tags/v}"
          helm package charts/kconmon-ng --version "$VERSION" --app-version "$VERSION"
          helm push "kconmon-ng-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
