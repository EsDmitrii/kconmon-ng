apiVersion: v2
name: kconmon-ng
description: Kubernetes Node Connectivity Monitor - Next Generation
type: application
version: 1.3.3
appVersion: "1.3.3"
keywords:
  - kubernetes
  - connectivity
  - monitoring
  - network
maintainers:
  - name: Dmitrii Esin
    url: https://github.com/EsDmitrii
home: https://github.com/EsDmitrii/kconmon-ng
sources:
  - https://github.com/EsDmitrii/kconmon-ng

annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/EsDmitrii/kconmon-ng
    - name: Documentation
      url: https://github.com/EsDmitrii/kconmon-ng#readme
  artifacthub.io/changes: |
    - kind: fixed
      description: ICMP checker sets net.ipv4.ping_group_range so ping sockets work on all runtimes
    - kind: added
      description: new agent.podSecurityContext value opens net.ipv4.ping_group_range for the ICMP checker
    - kind: fixed
      description: values.schema.json http target field expectedStatus -> expectStatus to match the checker
    - kind: added
      description: kubectl-kconmon plugin for on-demand topology and connectivity checks (install via krew)
    - kind: added
      description: On-demand diagnostics API — POST /api/v1/diagnostics runs a one-shot check (leader only)
    - kind: fixed
      description: Graceful agent deregistration on SIGTERM — peers drop a restarting pod at once, not after TTL
    - kind: security
      description: go1.26.4 toolchain plus grpc/x-net/otel bumps clear the previous CVE findings
    - kind: security
      description: govulncheck CI job and weekly Dependabot updates for gomod, github-actions and docker
