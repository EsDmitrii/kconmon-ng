apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kconmon-ng.fullname" . }}-connection-test"
  labels:
    {{- include "kconmon-ng.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  containers:
    - name: connection-test
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          set -e
          CONTROLLER="{{ include "kconmon-ng.fullname" . }}-controller"
          echo "Testing controller health at http://${CONTROLLER}:{{ .Values.config.httpPort }}/healthz"
          curl -sf "http://${CONTROLLER}:{{ .Values.config.httpPort }}/healthz" || exit 1
          echo "Health check passed"
  restartPolicy: Never
