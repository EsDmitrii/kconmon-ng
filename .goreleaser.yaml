---
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agent
    main: ./cmd/agent
    binary: kconmon-ng-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Version={{.Version}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Commit={{.Commit}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.BuildDate={{.Date}}

  - id: controller
    main: ./cmd/controller
    binary: kconmon-ng-controller
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Version={{.Version}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Commit={{.Commit}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.BuildDate={{.Date}}

  - id: kubectl-kconmon
    main: ./cmd/kubectl-kconmon
    binary: kubectl-kconmon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Version={{.Version}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Commit={{.Commit}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.BuildDate={{.Date}}

dockers:
  - id: agent-amd64
    ids: [agent]
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-amd64"
    dockerfile: Dockerfile.agent
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=kconmon-ng-agent"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

  - id: agent-arm64
    ids: [agent]
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-arm64"
    dockerfile: Dockerfile.agent
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=kconmon-ng-agent"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

  - id: controller-amd64
    ids: [controller]
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-amd64"
    dockerfile: Dockerfile.controller
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=kconmon-ng-controller"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

  - id: controller-arm64
    ids: [controller]
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-arm64"
    dockerfile: Dockerfile.controller
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=kconmon-ng-controller"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

docker_manifests:
  - name_template: "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-arm64"

  - name_template: "ghcr.io/esdmitrii/kconmon-ng-agent:latest"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-arm64"

  - name_template: "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-arm64"

  - name_template: "ghcr.io/esdmitrii/kconmon-ng-controller:latest"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-arm64"

archives:
  - id: server
    ids: [agent, controller]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  # krew requires the plugin binary and a LICENSE in each platform archive.
  - id: kubectl-kconmon
    ids: [kubectl-kconmon]
    formats: [tar.gz]
    name_template: "kconmon_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: EsDmitrii
    name: kconmon-ng
  prerelease: auto
  # Create the release as a draft: GitHub immutable releases seal assets at
  # publish time, so the krew manifest must be uploaded while still a draft.
  # The workflow publishes the draft as its final step, which also makes the
  # release near-atomic — it goes live only after helm/cosign/oras succeed.
  draft: true
