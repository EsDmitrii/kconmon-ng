---
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agent
    main: ./cmd/agent
    binary: kconmon-ng-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Version={{.Version}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Commit={{.Commit}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.BuildDate={{.Date}}

  - id: controller
    main: ./cmd/controller
    binary: kconmon-ng-controller
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Version={{.Version}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.Commit={{.Commit}}
      - -X github.com/EsDmitrii/kconmon-ng/internal/config.BuildDate={{.Date}}

dockers:
  - id: agent-amd64
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-amd64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--target=agent"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=kconmon-ng-agent"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

  - id: agent-arm64
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-arm64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--target=agent"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=kconmon-ng-agent"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

  - id: controller-amd64
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-amd64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--target=controller"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=kconmon-ng-controller"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

  - id: controller-arm64
    use: buildx
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-arm64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--target=controller"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=kconmon-ng-controller"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/EsDmitrii/kconmon-ng"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

docker_manifests:
  - name_template: "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-arm64"

  - name_template: "ghcr.io/esdmitrii/kconmon-ng-agent:latest"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-agent:{{.Version}}-arm64"

  - name_template: "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-arm64"

  - name_template: "ghcr.io/esdmitrii/kconmon-ng-controller:latest"
    image_templates:
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-amd64"
      - "ghcr.io/esdmitrii/kconmon-ng-controller:{{.Version}}-arm64"

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: EsDmitrii
    name: kconmon-ng
  prerelease: auto
